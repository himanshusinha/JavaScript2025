<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statements</title>
  </head>
  <body>
    <h2>Statements in html</h2>
    <p id="demo"></p>
    <script>
      function show() {
        let a = 10;
        let b = 20;
        let c = a + b;
        console.log(`Addition of ${a} and ${b} is ${c}`);
      }
    </script>
    <button onclick="show()">Show</button>
  </body>
</html>
