<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operators</title>
  </head>
  <body>
    <h1>JavaScript Operators</h1>
    <p id="demo"></p>

    <script>
      function Operators() {
        let a = 10;
        let b = 20;

        // Arithmetic Operators
        let c = a + b;
        let d = a - b;
        let e = a * b;
        let f = a / b;
        let g = a % b;

        // Assignment Operators
        let value = 10;

        value += 5;
        let addAssign = value;

        value -= 3;
        let subAssign = value;

        value *= 2;
        let mulAssign = value;

        value /= 4;
        let divAssign = value;

        value %= 5;
        let modAssign = value;

        value **= 3;
        let expAssign = value;

        // Comparison Operators
        let p = 10;
        let q = 2;

        let eq = p == q;
        let strictEq = p === q;
        let notEq = p != q;
        let strictNotEq = p !== q;
        let greater = p > q;
        let less = p < q;
        let greaterEq = p >= q;
        let lessEq = p <= q;

        // Display output
        document.getElementById("demo").innerHTML = `
          <b>Arithmetic Operators</b><br>
          Addition: ${c} <br>
          Subtraction: ${d} <br>
          Multiplication: ${e} <br>
          Division: ${f} <br>
          Modulus: ${g} <br><br>

          <b>Assignment Operators</b><br>
          += : ${addAssign} <br>
          -= : ${subAssign} <br>
          *= : ${mulAssign} <br>
          /= : ${divAssign} <br>
          %= : ${modAssign} <br>
          **= : ${expAssign} <br><br>

          <b>Comparison Operators</b><br>
          p == q : ${eq} <br>
          p === q : ${strictEq} <br>
          p != q : ${notEq} <br>
          p !== q : ${strictNotEq} <br>
          p > q : ${greater} <br>
          p < q : ${less} <br>
          p >= q : ${greaterEq} <br>
          p <= q : ${lessEq}
        `;

        // Console (optional)
        console.log("All operators executed");
      }
    </script>

    <button onclick="Operators()">Run Operators</button>
  </body>
</html>
