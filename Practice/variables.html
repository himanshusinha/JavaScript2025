<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variables</title>
  </head>
  <body>
    <h1>Variables in JavaScript</h1>
    <p id="demo"></p>

    <script>
      /*
        JavaScript Variable Rules:

        1. var:
           - Old way to declare variables
           - Function-scoped (not block-scoped)
           - Can be re-declared and updated
           Example:
           var x = 10;
           var x = 20; // allowed

        2. let:
           - Block-scoped (works inside { })
           - Can be updated but NOT re-declared in same scope
           Example:
           let y = 10;
           y = 20; // allowed
           // let y = 30;  not allowed

        3. const:
           - Block-scoped
           - Cannot be updated or re-declared
           - Must be initialized at declaration
           Example:
           const z = 10;
           // z = 20;  not allowed

        Note:
        - Always prefer const unless value needs to change
        - Use let if value changes
        - Avoid var in modern JavaScript
      */

      function variableInfo() {
        const a = 10;
        const b = 20;
        const c = a + b;

        // Show result on webpage
        document.getElementById("demo").innerHTML =
          `Result of ${a} and ${b} is ${c}`;

        // Also log in console
        console.log(`Result of ${a} and ${b} is ${c}`);

        let x;
        x = "Himanshu";
        console.log(x);
      }

      var j; // undefined
      j = 10; // int
      j = "Himanhu Sinha"; // string

      console.log(typeof j);
    </script>

    <button onclick="variableInfo()">Display</button>
  </body>
</html>
