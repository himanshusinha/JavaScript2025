<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Html Outputs</title>
  </head>
  <body>
    <h1>Html Output</h1>
    <p id="demo"></p>

    <script>
      function output() {
        let x = 10;
        let y = 20;
        let result = x + y;
        document.getElementById("demo").innerHTML = "Hello";
        document.write(10 + 20);
        window.alert("Addition is " + result);
        console.log("Result is", result);
      }
    </script>
    <button onclick="output()">Show</button>
  </body>
</html>
