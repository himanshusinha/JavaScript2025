<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Styles</title>
  </head>
  <body>
    <h1>Change Style</h1>
    <p id="demo">Change font size</p>
    <script>
      function changeStyle() {
        document.getElementById("demo").style.fontSize = "30px";
      }
    </script>
    <button onclick="changeStyle()">Change FontSize</button>
  </body>
</html>
