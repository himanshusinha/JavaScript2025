<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My First</title>
  </head>
  <body>
    <h1>My First JavaScript</h1>
    <p id="demo"></p>
    <script>
      function myFirst() {
        document.getElementById("demo").innerHTML = new Date();
      }
    </script>
    <button onclick="myFirst()">Display Date</button>
  </body>
</html>
